<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solana Token Creator</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="https://unpkg.com/@solana/spl-token@latest/lib/index.iife.min.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0f172a;
padding:30px;
border-radius:10px;
width:380px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

#result{
margin-top:20px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="box">

<h2>Solana Token Creator</h2>

<button onclick="connectWallet()">Connect Phantom</button>

<input id="name" placeholder="Token Name">
<input id="symbol" placeholder="Symbol">
<input id="decimals" value="9">
<input id="supply" value="1000000000">

<button onclick="createToken()">Create Token</button>

<div id="result"></div>

</div>

<script>

const connection =
new solanaWeb3.Connection(
"https://api.mainnet-beta.solana.com"
);

let wallet;

async function connectWallet(){

if(!window.solana){

alert("Install Phantom Wallet");

return;

}

const resp = await window.solana.connect();

wallet = resp.publicKey;

alert("Connected: " + wallet.toString());

}

async function createToken(){

try{

const mint =
solanaWeb3.Keypair.generate();

const decimals =
parseInt(document.getElementById("decimals").value);

const supply =
parseInt(document.getElementById("supply").value);

const lamports =
await connection.getMinimumBalanceForRentExemption(
splToken.MintLayout.span
);

const tx =
new solanaWeb3.Transaction();

tx.add(

solanaWeb3.SystemProgram.createAccount({

fromPubkey: wallet,
newAccountPubkey: mint.publicKey,
space: splToken.MintLayout.span,
lamports: lamports,
programId: splToken.TOKEN_PROGRAM_ID

})

);

tx.add(

splToken.createInitializeMintInstruction(

mint.publicKey,
decimals,
wallet,
wallet

)

);

const ata =
await splToken.getAssociatedTokenAddress(

mint.publicKey,
wallet

);

tx.add(

splToken.createAssociatedTokenAccountInstruction(

wallet,
ata,
wallet,
mint.publicKey

)

);

const amount =
supply * Math.pow(10,decimals);

tx.add(

splToken.createMintToInstruction(

mint.publicKey,
ata,
wallet,
amount

)

);

tx.add(

splToken.createSetAuthorityInstruction(

mint.publicKey,
wallet,
splToken.AuthorityType.MintTokens,
null

)

);

tx.add(

splToken.createSetAuthorityInstruction(

mint.publicKey,
wallet,
splToken.AuthorityType.FreezeAccount,
null

)

);

tx.feePayer = wallet;

tx.recentBlockhash =
(await connection.getLatestBlockhash()).blockhash;

tx.partialSign(mint);

const signed =
await window.solana.signTransaction(tx);

const sig =
await connection.sendRawTransaction(
signed.serialize()
);

await connection.confirmTransaction(sig);

document.getElementById("result").innerHTML =

"✅ Token Created <br><br>" +

"Mint Address:<br>" +

mint.publicKey.toString() +

"<br><br>" +

"<a target='_blank' href='https://solscan.io/token/" +

mint.publicKey.toString() +

"'>View Token</a>";

}

catch(err){

console.error(err);

alert("Transaction Failed");

}

}

</script>

</body>
</html>
