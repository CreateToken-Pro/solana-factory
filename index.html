<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Factory v17 | No-Auth RPC</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.4.0/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script src="https://unpkg.com/@metaplex-foundation/mpl-token-metadata@2.13.0/dist/index.iife.min.js"></script>
    
    <style>
        :root { --neon: #14f195; --purple: #9945ff; --bg: #0d0d0d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .main-card { width: 100%; max-width: 480px; background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #2a2a2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-preview { width: 70px; height: 70px; border-radius: 50%; background: #222; margin: 0 auto 15px; border: 2px dashed var(--neon); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-preview img { width: 100%; height: 100%; object-fit: cover; }
        input, textarea { width: 100%; padding: 12px; background: #202020; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--neon); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; margin-top: 5px; }
        #btnConnect { background: var(--purple); color: white; }
        #btnLaunch { background: var(--neon); color: black; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #console { background: #000; padding: 12px; border-radius: 10px; font-size: 11px; font-family: monospace; color: #00ff00; margin-top: 15px; border: 1px solid #1a1a1a; max-height: 120px; overflow-y: auto; line-height: 1.5; }
        .auth-settings { background: #1f1f1f; padding: 12px; border-radius: 10px; font-size: 12px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>

<div class="main-card">
    <h3 style="text-align:center; margin-top:0; color:var(--neon)">Solana Token Creator</h3>
    
    <div class="logo-preview"><img id="imgPrev" style="display:none"></div>
    
    <button id="btnConnect" class="btn">1. Hubungkan Phantom</button>

    <div style="margin-top:15px;">
        <input type="text" id="tName" placeholder="Nama Token">
        <input type="text" id="tSymbol" placeholder="Simbol (Max 10)">
        <textarea id="tDesc" placeholder="Deskripsi..."></textarea>
        
        <label style="font-size: 11px; color: #777;">Pilih Logo:</label>
        <input type="file" id="tFile" accept="image/*">

        <div class="grid">
            <input type="number" id="tSupply" value="1000000000" title="Supply">
            <input type="number" id="tDec" value="9" title="Decimals">
        </div>

        <div class="auth-settings">
            <label style="display:block; margin-bottom:4px;"><input type="checkbox" id="revMint" checked> Revoke Mint (Fixed Supply)</label>
            <label style="display:block; margin-bottom:4px;"><input type="checkbox" id="revFreeze" checked> Revoke Freeze (Security)</label>
            <label style="display:block;"><input type="checkbox" id="revMeta" checked> Revoke Metadata (Immutable)</label>
        </div>

        <button id="btnLaunch" class="btn">LAUNCH TOKEN (0.3 SOL)</button>
    </div>

    <div id="console">Status: Siap meluncur...</div>
</div>

<script>
    window.Buffer = buffer.Buffer;
    const METAPLEX_ID = new solanaWeb3.PublicKey("metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s");
    const FEE_WALLET = "38d92K9xPyTM9Cg4x8fdYcTgzEXiJ5FuwvJbeT6Xu7M8";
    const PINATA_JWT = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiI0MThlMGJkOC04MjJiLTQzYTktYmY4ZS0zMTA0ZmRlNDQzMzYiLCJlbWFpbCI6InZhcmlhc2ltb3RvcnRAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjhmNzEyZThmMWE2ZDI1MTU4ZDgxIiwic2NvcGVkS2V5U2VjcmV0IjoiODlhNWEwYjBkOTY4MTM5NDVhOWNlODQwYmNhYTUzNDcwOGExOTRiMGIyYjQ4YzU4MGNiMzMxYmYxODc3MDYzNyIsImV4cCI6MTgwNDMyOTk3OX0.A4lFCvpr0AUDZcDhG9bX3o6uMINlkJcNqDmgQWt97wE";

    // ANTI ERROR 401: Jalur RPC Publik Tanpa Token
    const PUBLIC_RPCs = [
        "https://api.mainnet-beta.solana.com",
        "https://solana-mainnet.rpc.blink.xyz",
        "https://rpc.ankr.com/solana"
    ];

    let userKey = null;
    const print = (m) => { 
        const c = document.getElementById('console');
        c.innerHTML += `> ${m}<br>`;
        c.scrollTop = c.scrollHeight;
    };

    document.getElementById('tFile').onchange = (e) => {
        const url = URL.createObjectURL(e.target.files[0]);
        document.getElementById('imgPrev').src = url;
        document.getElementById('imgPrev').style.display = 'block';
    };

    document.getElementById('btnConnect').onclick = async () => {
        try {
            const resp = await window.solana.connect();
            userKey = resp.publicKey;
            document.getElementById('btnConnect').innerText = "Wallet OK: " + userKey.toBase58().slice(0,4) + "..";
            print("Wallet terhubung!");
        } catch (e) { print("Gagal connect wallet!"); }
    };

    async function getSafeConnection() {
        for (let rpc of PUBLIC_RPCs) {
            try {
                const conn = new solanaWeb3.Connection(rpc, "confirmed");
                await conn.getLatestBlockhash();
                print("Terhubung ke: " + new URL(rpc).hostname);
                return conn;
            } catch (e) { print("Mencoba jalur cadangan..."); }
        }
        throw new Error("Semua jalur penuh. Coba lagi 1 menit lagi.");
    }

    document.getElementById('btnLaunch').onclick = async () => {
        if (!userKey) return alert("Hubungkan Wallet!");
        const file = document.getElementById('tFile').files[0];
        if (!file) return alert("Pilih Logo!");

        const btn = document.getElementById('btnLaunch');
        btn.disabled = true;
        btn.innerText = "SEDANG PROSES...";

        try {
            const conn = await getSafeConnection();
            
            print("Mengunggah metadata ke IPFS...");
            const fd = new FormData();
            fd.append('file', file);
            
            const imgRes = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
                method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}` }, body: fd
            });
            const imgHash = (await imgRes.json()).IpfsHash;

            const metaJSON = {
                name: document.getElementById('tName').value,
                symbol: document.getElementById('tSymbol').value,
                description: document.getElementById('tDesc').value,
                image: `https://gateway.pinata.cloud/ipfs/${imgHash}`
            };

            const jsonRes = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
                method: 'POST', headers: { Authorization: `Bearer ${PINATA_JWT}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(metaJSON)
            });
            const metaUri = `https://gateway.pinata.cloud/ipfs/${(await jsonRes.json()).IpfsHash}`;

            print("Menyiapkan transaksi...");
            const mintKp = solanaWeb3.Keypair.generate();
            const tx = new solanaWeb3.Transaction();

            // 1. Fee Service
            tx.add(solanaWeb3.SystemProgram.transfer({
                fromPubkey: userKey, toPubkey: new solanaWeb3.PublicKey(FEE_WALLET),
                lamports: 0.3 * solanaWeb3.LAMPORTS_PER_SOL
            }));

            // 2. Buat Mint Account
            const dec = parseInt(document.getElementById('tDec').value);
            const rent = await conn.getMinimumBalanceForRentExemption(82);
            tx.add(
                solanaWeb3.SystemProgram.createAccount({ fromPubkey: userKey, newAccountPubkey: mintKp.publicKey, space: 82, lamports: rent, programId: splToken.TOKEN_PROGRAM_ID }),
                splToken.createInitializeMintInstruction(mintKp.publicKey, dec, userKey, userKey)
            );

            // 3. Metadata Account
            const [mPDA] = solanaWeb3.PublicKey.findProgramAddressSync([Buffer.from("metadata"), METAPLEX_ID.toBuffer(), mintKp.publicKey.toBuffer()], METAPLEX_ID);
            tx.add(mplTokenMetadata.createCreateMetadataAccountV3Instruction(
                { metadata: mPDA, mint: mintKp.publicKey, mintAuthority: userKey, payer: userKey, updateAuthority: userKey },
                { createMetadataAccountV3Args: { data: { name: metaJSON.name, symbol: metaJSON.symbol, uri: metaUri, sellerFeeBasisPoints: 0, creators: null, collection: null, uses: null }, isMutable: !document.getElementById('revMeta').checked, collectionDetails: null } }
            ));

            // 4. Token Account & Minting
            const ata = await splToken.getAssociatedTokenAddress(mintKp.publicKey, userKey);
            tx.add(
                splToken.createAssociatedTokenAccountInstruction(userKey, ata, userKey, mintKp.publicKey),
                splToken.createMintToInstruction(mintKp.publicKey, ata, userKey, BigInt(document.getElementById('tSupply').value) * BigInt(10 ** dec))
            );

            // 5. Revokes
            if(document.getElementById('revMint').checked) tx.add(splToken.createSetAuthorityInstruction(mintKp.publicKey, userKey, splToken.AuthorityType.MintTokens, null));
            if(document.getElementById('revFreeze').checked) tx.add(splToken.createSetAuthorityInstruction(mintKp.publicKey, userKey, splToken.AuthorityType.FreezeAccount, null));

            print("Konfirmasi di Phantom kamu...");
            const { signature } = await window.solana.signAndSendTransaction(tx, [mintKp]);
            print("Berhasil! TX: " + signature.slice(0,8) + "...");
            alert("SUKSES!\nAlamat Token: " + mintKp.publicKey.toBase58());

        } catch (e) {
            print("Error: " + e.message);
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.innerText = "LAUNCH TOKEN (0.3 SOL)";
        }
    };
</script>
</body>
</html>
