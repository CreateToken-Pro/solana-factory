<style>
:root{--green:#14f195;--purple:#9945ff;--bg:#0b0b0b;}
body{font-family:'Segoe UI';background:var(--bg);color:white;padding:20px;display:flex;justify-content:center}
.container{max-width:420px;width:100%;background:#121212;padding:20px;border-radius:14px;border:1px solid #333}
h2{text-align:center;color:var(--green)}
input,textarea{width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;color:white;border-radius:8px;margin-bottom:10px}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
#btnConnect{background:var(--purple);color:white}
#btnCreate{background:var(--green);color:black;margin-top:10px}
#log{background:black;color:#14f195;font-size:11px;padding:10px;border-radius:8px;height:120px;overflow:auto;margin-top:10px}

<body>

<div class="container">

<h2>Solana Token Creator</h2>

<button id="btnConnect" class="btn">CONNECT WALLET</button>

<input id="name" placeholder="Token Name">
<input id="symbol" placeholder="Symbol">
<textarea id="desc" placeholder="Description"></textarea>

<input type="file" id="logoFile" accept="image/*">

<input type="number" id="supply" value="1000000000">
<input type="number" id="decimals" value="9">

<button id="btnCreate" class="btn">CREATE TOKEN (0.3 SOL)</button>

<div id="log">Status: menunggu wallet...</div>

</div>

function log(t){
const el=document.getElementById("log")
el.innerHTML+="<br>> "+t
el.scrollTop=el.scrollHeight

document.getElementById("btnConnect").onclick=async()=>{

if(!window.solana?.isPhantom){
alert("Buka dari browser Phantom")
return
}

const resp=await window.solana.connect()
wallet=resp.publicKey

document.getElementById("btnConnect").innerText=
"CONNECTED "+wallet.toBase58().slice(0,4)+"..."

log("Wallet connected")

}

async function uploadIPFS(file,name,symbol,desc){

log("Upload logo IPFS")

const fd=new FormData()
fd.append("file",file)

const r=await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS",{
method:"POST",
headers:{Authorization:`Bearer ${PINATA}`},
body:fd
})

const img=await r.json()

const imageUrl=`https://gateway.pinata.cloud/ipfs/${img.IpfsHash}`

log("Upload metadata")

const meta={
name,
symbol,
description:desc,
image:imageUrl,
properties:{files:[{uri:imageUrl,type:file.type}]}
}

const r2=await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS",{
method:"POST",
headers:{
Authorization:`Bearer ${PINATA}`,
"Content-Type":"application/json"
},
body:JSON.stringify(meta)
})

const js=await r2.json()

return `https://gateway.pinata.cloud/ipfs/${js.IpfsHash}`

}

document.getElementById("btnCreate").onclick=async()=>{

try{

if(!wallet) throw "Connect wallet dulu"

const file=document.getElementById("logoFile").files[0]
if(!file) throw "Logo belum dipilih"

const connection=new solanaWeb3.Connection(RPC,"confirmed")

const bal=await connection.getBalance(wallet)

if(bal<0.35*solanaWeb3.LAMPORTS_PER_SOL)
throw "Saldo tidak cukup"

const name=document.getElementById("name").value
const symbol=document.getElementById("symbol").value
const desc=document.getElementById("desc").value

const decimals=parseInt(document.getElementById("decimals").value)
const supply=document.getElementById("supply").value

const metadataUri=await uploadIPFS(file,name,symbol,desc)

log("Build transaction")

const mint=solanaWeb3.Keypair.generate()

const tx=new solanaWeb3.Transaction()

tx.add(
solanaWeb3.SystemProgram.transfer({
fromPubkey:wallet,
toPubkey:new solanaWeb3.PublicKey(OWNER),
lamports:0.3*solanaWeb3.LAMPORTS_PER_SOL
})
)

const rent=await connection.getMinimumBalanceForRentExemption(82)

tx.add(
solanaWeb3.SystemProgram.createAccount({
fromPubkey:wallet,
newAccountPubkey:mint.publicKey,
space:82,
lamports:rent,
programId:splToken.TOKEN_PROGRAM_ID
})
)

tx.add(
splToken.createInitializeMintInstruction(
mint.publicKey,
decimals,
wallet,
wallet
)
)

const ata=await splToken.getAssociatedTokenAddress(
mint.publicKey,
wallet
)

tx.add(
splToken.createAssociatedTokenAccountInstruction(
wallet,
ata,
wallet,
mint.publicKey
)
)

const amount=
BigInt(supply)*(10n**BigInt(decimals))

tx.add(
splToken.createMintToInstruction(
mint.publicKey,
ata,
wallet,
amount
)
)

const block=await connection.getLatestBlockhash()

tx.recentBlockhash=block.blockhash
tx.feePayer=wallet

log("Approve Phantom")

tx.partialSign(mint)

const signed=await window.solana.signTransaction(tx)

const sig=await connection.sendRawTransaction(
signed.serialize()
)

await connection.confirmTransaction(sig)

log("SUCCESS")

alert(
"TOKEN CREATED\n\nCA:\n"+
mint.publicKey.toBase58()+
"\n\nhttps://solscan.io/token/"+mint.publicKey.toBase58()
)

}catch(e){

log("ERROR: "+e)

}

}
