<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solana Creator v23</title>
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.9/lib/index.iife.min.js"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <style>
        :root{--green:#14f195;--purple:#9945ff;--bg:#0b0b0b;}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:white;padding:15px;margin:0;display:flex;justify-content:center;}
        .container{max-width:420px;width:100%;background:#121212;padding:20px;border-radius:14px;border:1px solid #333;box-sizing:border-box;}
        h2{text-align:center;color:var(--green);margin-bottom:20px;}
        input,textarea{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;color:white;border-radius:8px;margin-bottom:10px;box-sizing:border-box;font-size:14px;}
        .btn{width:100%;padding:15px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;font-size:15px;transition:0.2s;}
        #btnConnect{background:var(--purple);color:white;margin-bottom:15px;}
        #btnCreate{background:var(--green);color:black;margin-top:10px;}
        #log{background:black;color:#14f195;font-size:11px;padding:12px;border-radius:8px;height:120px;overflow:auto;margin-top:15px;border:1px solid #222;font-family:monospace;}
        .opt-card{background:#1a1a1a;padding:10px;border-radius:8px;border:1px solid #333;margin-bottom:10px;font-size:13px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Solana Token Creator</h2>
    <button id="btnConnect" class="btn">1. CONNECT WALLET</button>

    <input id="name" placeholder="Token Name">
    <input id="symbol" placeholder="Symbol">
    <textarea id="desc" placeholder="Description" rows="2"></textarea>

    <label style="font-size:11px;color:#888">Logo File:</label>
    <input type="file" id="logoFile" accept="image/*">

    <div style="display:flex;gap:10px">
        <input type="number" id="supply" value="1000000000">
        <input type="number" id="decimals" value="9">
    </div>

    <div class="opt-card">
        <label><input type="checkbox" id="revMint" checked> Revoke Mint (Fixed Supply)</label><br>
        <label><input type="checkbox" id="revFreeze" checked> Revoke Freeze (Security)</label>
    </div>

    <button id="btnCreate" class="btn">LAUNCH TOKEN (0.3 SOL)</button>
    <div id="log">Status: Menunggu Wallet...</div>
</div>

<script>
    window.Buffer = buffer.Buffer;
    const solanaWeb3 = window.solanaWeb3;
    
    // Fallback manual jika library telat muat
    const getSplToken = () => window.splToken || (window.solanaWeb3 ? window.solanaWeb3.splToken : null);

    const RPC = "https://mainnet.helius-rpc.com/?api-key=8a3c5a03-6ddb-4ebf-8b28-ee7f2b31f8c1";
    const OWNER = "38d92K9xPyTM9Cg4x8fdYcTgzEXiJ5FuwvJbeT6Xu7M8";
    const PINATA = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySW5mb3JtYXRpb24iOnsiaWQiOiI0MThlMGJkOC04MjJiLTQzYTktYmY4ZS0zMTA0ZmRlNDQzMzYiLCJlbWFpbCI6InZhcmlhc2ltb3RvcnRAZ21haWwuY29tIiwiZW1haWxfdmVyaWZpZWQiOnRydWUsInBpbl9wb2xpY3kiOnsicmVnaW9ucyI6W3siZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiRlJBMSJ9LHsiZGVzaXJlZFJlcGxpY2F0aW9uQ291bnQiOjEsImlkIjoiTllDMSJ9XSwidmVyc2lvbiI6MX0sIm1mYV9lbmFibGVkIjpmYWxzZSwic3RhdHVzIjoiQUNUSVZFIn0sImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjhmNzEyZThmMWE2ZDI1MTU4ZDgxIiwic2NvcGVkS2V5U2VjcmV0IjoiODlhNWEwYjBkOTY4MTM5NDVhOWNlODQwYmNhYTUzNDcwOGExOTRiMGIyYjQ4YzU4MGNiMzMxYmYxODc3MDYzNyIsImV4cCI6MTgwNDMyOTk3OX0.A4lFCvpr0AUDZcDhG9bX3o6uMINlkJcNqDmgQWt97wE";

    let wallet = null;
    const log = (t) => {
        const el = document.getElementById("log");
        el.innerHTML += `<br>> ${t}`;
        el.scrollTop = el.scrollHeight;
    };

    document.getElementById("btnConnect").onclick = async () => {
        if (!window.solana?.isPhantom) return alert("Gunakan Browser Phantom!");
        const resp = await window.solana.connect();
        wallet = resp.publicKey;
        document.getElementById("btnConnect").innerText = "CONNECTED: " + wallet.toBase58().slice(0,6);
        log("Wallet Connected.");
    };

    async function uploadIPFS(file, name, symbol, desc) {
        log("Uploading to IPFS...");
        const fd = new FormData();
        fd.append("file", file);
        const r = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
            method: "POST", headers: { Authorization: `Bearer ${PINATA}` }, body: fd
        });
        const img = await r.json();
        const imageUrl = `https://gateway.pinata.cloud/ipfs/${img.IpfsHash}`;

        const meta = { name, symbol, description: desc, image: imageUrl };
        const r2 = await fetch("https://api.pinata.cloud/pinning/pinJSONToIPFS", {
            method: "POST", headers: { Authorization: `Bearer ${PINATA}`, "Content-Type": "application/json" },
            body: JSON.stringify(meta)
        });
        const js = await r2.json();
        return `https://gateway.pinata.cloud/ipfs/${js.IpfsHash}`;
    }

    document.getElementById("btnCreate").onclick = async () => {
        const spl = getSplToken();
        if (!spl) return alert("Library Token belum siap, tunggu sebentar...");
        if (!wallet) return alert("Connect Wallet dulu!");
        
        const btn = document.getElementById("btnCreate");
        btn.disabled = true; btn.innerText = "PROCESSING...";

        try {
            const connection = new solanaWeb3.Connection(RPC, "confirmed");
            const file = document.getElementById("logoFile").files[0];
            if(!file) throw "Logo wajib diisi!";

            const metadataUri = await uploadIPFS(file, document.getElementById("name").value, document.getElementById("symbol").value, document.getElementById("desc").value);
            
            log("Building Transaction...");
            const mint = solanaWeb3.Keypair.generate();
            const tx = new solanaWeb3.Transaction();

            // 1. Fee
            tx.add(solanaWeb3.SystemProgram.transfer({
                fromPubkey: wallet, toPubkey: new solanaWeb3.PublicKey(OWNER),
                lamports: 0.3 * solanaWeb3.LAMPORTS_PER_SOL
            }));

            // 2. Create Account & Initialize Mint
            const decimals = parseInt(document.getElementById("decimals").value);
            tx.add(
                solanaWeb3.SystemProgram.createAccount({
                    fromPubkey: wallet, newAccountPubkey: mint.publicKey,
                    space: 82, lamports: await connection.getMinimumBalanceForRentExemption(82),
                    programId: spl.TOKEN_PROGRAM_ID
                }),
                spl.createInitializeMintInstruction(mint.publicKey, decimals, wallet, wallet)
            );

            // 3. ATA & Mint To
            const ata = await spl.getAssociatedTokenAddress(mint.publicKey, wallet);
            const amount = BigInt(document.getElementById("supply").value) * (10n ** BigInt(decimals));
            tx.add(
                spl.createAssociatedTokenAccountInstruction(wallet, ata, wallet, mint.publicKey),
                spl.createMintToInstruction(mint.publicKey, ata, wallet, amount)
            );

            // 4. Revoke Authorities (Optional)
            if(document.getElementById("revMint").checked) {
                tx.add(spl.createSetAuthorityInstruction(mint.publicKey, wallet, spl.AuthorityType.MintTokens, null));
                log("Adding: Revoke Mint...");
            }
            if(document.getElementById("revFreeze").checked) {
                tx.add(spl.createSetAuthorityInstruction(mint.publicKey, wallet, spl.AuthorityType.FreezeAccount, null));
                log("Adding: Revoke Freeze...");
            }

            tx.recentBlockhash = (await connection.getLatestBlockhash()).blockhash;
            tx.feePayer = wallet;
            tx.partialSign(mint);

            log("Approve in Phantom...");
            const signed = await window.solana.signTransaction(tx);
            const sig = await connection.sendRawTransaction(signed.serialize());
            
            log("Confirming... CA: " + mint.publicKey.toBase58());
            await connection.confirmTransaction(sig);
            alert("SUCCESS! Token Created.");

        } catch (e) { log("Error: " + e); }
        finally { btn.disabled = false; btn.innerText = "LAUNCH TOKEN (0.3 SOL)"; }
    };
</script>
</body>
</html>
